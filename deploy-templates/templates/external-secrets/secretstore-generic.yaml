{{- if and .Values.eso.enabled (eq .Values.eso.provider "generic") }}
apiVersion: {{ .Values.eso.apiVersion }}
kind: SecretStore
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "claude-code-telemetry.labels" . | nindent 4 }}
spec:
  provider:
    {{- with .Values.eso.generic.secretStore.providerConfig }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
