{{- if .Values.dashboards.enabled }}
{{- range $scope, $folder := .Values.dashboards.folders }}
{{- range $path, $file := $.Files.Glob (printf "config/grafana/dashboards/%s/*.json" $scope) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-%s" (include "claude-code-telemetry.fullname" $) (base $path | trimSuffix ".json" | lower) | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "claude-code-telemetry.labels" $ | nindent 4 }}
    {{ $.Values.dashboards.label }}: {{ $.Values.dashboards.labelValue | quote }}
  annotations:
    {{ $.Values.dashboards.folderAnnotation }}: {{ $folder | quote }}
    {{- with $.Values.dashboards.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  {{ base $path }}: |-
    {{- $.Files.Get $path | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
