# LOCAL collector config — self-contained, hardcoded for the docker-compose stack.
# Iterate here; once validated, replicate the change into the Helm chart's pipeline
# (deploy-templates/values.yaml -> opentelemetry-collector.alternateConfig).
#
# Receives OTLP from Claude Code, fans metrics to Prometheus and events/logs to Loki.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

# The k8s Deployment's liveness/readiness probes target this endpoint (:13133);
# harmless locally, required in the Helm bundle.
extensions:
  health_check:
    endpoint: 0.0.0.0:13133

processors:
  batch:
    timeout: 5s
  # Tag everything so multiple sources (laptops, CI) are distinguishable in one backend.
  resource:
    attributes:
      - key: collector.env
        value: local-poc
        action: upsert

exporters:
  # Metrics -> Prometheus scrape endpoint on :8889.
  # Claude Code metrics are OTel counters, so Prometheus names carry the unit + `_total` suffix
  # (claude_code.token.usage -> claude_code_token_usage_tokens_total,
  #  claude_code.cost.usage -> claude_code_cost_usage_USD_total,
  #  claude_code.session.count -> claude_code_session_count_total). Dashboards query these names.
  # resource_to_telemetry_conversion turns resource attrs (project, jira.ticket, user.email, session.id...)
  # into Prometheus labels so we can break tokens/cost down by them.
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true

  # Events/logs -> Loki native OTLP ingest. Resource attrs become Loki labels;
  # event attributes (tool_name, skill.name, agent.name, decision, ...) become structured metadata.
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

  # Prints everything to `docker compose logs otel-collector` — handy to confirm data flows
  # and to discover exact attribute names. Set to `basic` once verified.
  debug:
    verbosity: detailed

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/loki, debug]
  telemetry:
    logs:
      level: info
    # Collector self-observability: expose internal otelcol_* metrics on :8888 for the
    # "Collector Health" dashboard (Prometheus scrapes this as the `otel-collector` job).
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
