global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Claude Code metrics, re-exported by the collector.
  - job_name: claude-code
    static_configs:
      - targets: ["otel-collector:8889"]

  # Collector's own health (optional).
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
