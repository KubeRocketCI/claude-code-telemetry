# Minimal single-binary Loki for local audit. Filesystem storage, no auth.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Let OTLP event attributes (tool_name, skill.name, ...) arrive as queryable structured metadata.
  allow_structured_metadata: true
  retention_period: 720h   # 30d
  reject_old_samples: false

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

# Silence the "please upgrade" telemetry.
analytics:
  reporting_enabled: false
